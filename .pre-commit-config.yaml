# Pre-commit hooks for Python projects.
# Copy to project root, adjust pyright rev to latest.
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 8a948e557ca98afa9489998ad0b85515964df9c4  # frozen: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: e99c5b43aa41681e83d439e6ebf3c82d7f3f6426  # frozen: 0.11.6
    hooks:
      - id: uv-lock
      - id: uv-export
        args:
          - --frozen
          - --no-dev
          - --no-emit-project
          - --output-file=requirements.txt

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright --level error
        language: system
        types: [python]
